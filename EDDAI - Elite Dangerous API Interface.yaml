          description: ''
    post:
      operationId: bgs_minor_factions_create
      description: Create a new minor faction.
      tags:
      - bgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinorFactionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MinorFactionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MinorFactionRequest'
        required: true
      security:
