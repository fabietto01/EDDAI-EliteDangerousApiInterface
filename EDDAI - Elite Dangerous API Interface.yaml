        name: id
        schema:
          type: integer
        description: A unique integer value identifying this government.
        required: true
      tags:
      - bgs
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Government'
          description: ''
  /api/v1/bgs/minor-factions:
