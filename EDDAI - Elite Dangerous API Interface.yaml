        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StateInMinorFactionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StateInMinorFactionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StateInMinorFactionRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateInMinorFaction'
          description: ''
    patch:
      operationId: bgs_minor_factions_in_system_states_partial_update
      description: |-
        OwnerAndDateModelViewSet is a custom viewset that extends the ModelViewSet class.
        It overrides the perform_create and perform_update methods to automatically set
        the created_by and updated_by fields to the current user.
        Methods:
            perform_create(serializer: OwnerAndDateModels):
                Saves the serializer with the created_by and updated_by fields set to the current user.
            perform_update(serializer: OwnerAndDateModels):
                Saves the serializer with the updated_by field set to the current user.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this State from the Minor
          Faction.
        required: true
      - in: path
        name: minorfactioninsystem_pk
        schema:
          type: string
        required: true
      tags:
      - bgs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStateInMinorFactionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStateInMinorFactionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStateInMinorFactionRequest'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateInMinorFaction'
          description: ''
    delete:
      operationId: bgs_minor_factions_in_system_states_destroy
      description: Remove a state from a minor faction in a system.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this State from the Minor
          Faction.
        required: true
      - in: path
        name: minorfactioninsystem_pk
        schema:
          type: integer
        description: The ID of the minor faction in system.
        required: true
      tags:
      - bgs
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
