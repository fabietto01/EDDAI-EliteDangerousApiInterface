openapi: 3.0.3
info:
  title: EDDAI - Elite Dangerous API Interface
  version: 1.0.0
  description: The EDDAI-EliteDangerousApiInterface APIs provide     an interface
    to access and manage data related to the Elite Dangerous game.     These APIs
    allow developers to interact with the project database,     enabling data read
    operations.
paths:
  /api/v1/atmosphere-component:
    get:
      operationId: atmosphere_component_list
      description: Returns a list of atmosphere components with a compact representation.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - atmosphere-component
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompactedAtmosphereComponentList'
          description: ''
  /api/v1/atmosphere-component/{id}:
    get:
      operationId: atmosphere_component_retrieve
      description: Returns the details of an atmosphere component by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this atmosphere component.
        required: true
      tags:
      - atmosphere-component
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AtmosphereComponent'
          description: ''
  /api/v1/atmosphere-type:
    get:
      operationId: atmosphere_type_list
      description: Returns a list of atmosphere types with a compact representation.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - atmosphere-type
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompactedAtmosphereTypeList'
          description: ''
  /api/v1/atmosphere-type/{id}:
    get:
      operationId: atmosphere_type_retrieve
      description: Returns the details of an atmosphere type by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this atmosphere type.
        required: true
      tags:
      - atmosphere-type
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AtmosphereType'
          description: ''
  /api/v1/bgs/factions:
    get:
      operationId: bgs_factions_list
      description: Retrieve a list of all factions available in the game.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - bgs
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFactionBasicInformationList'
          description: ''
  /api/v1/bgs/factions/{id}:
    get:
      operationId: bgs_factions_retrieve
      description: Get detailed information about a specific faction by its ID.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this faction.
        required: true
      tags:
      - bgs
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Faction'
          description: ''
  /api/v1/bgs/governments:
    get:
      operationId: bgs_governments_list
      description: Retrieve a list of all governments available in the game.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: type
        schema:
          type: array
          items:
            type: string
            nullable: true
            enum:
            - A
            - C
            - P
            - S
        description: |-
          * `A` - Anarchy
          * `C` - Autocrati
          * `P` - Corporazioni
          * `S` - Social
        explode: true
        style: form
      tags:
      - bgs
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGovernmentBasicInformationList'
          description: ''
  /api/v1/bgs/governments/{id}:
    get:
      operationId: bgs_governments_retrieve
      description: Get detailed information about a specific government by its ID.
      parameters:
