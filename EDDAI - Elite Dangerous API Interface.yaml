          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MinorFactionInSystemRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinorFactionInSystem'
          description: ''
  /api/v1/bgs/minor-factions-in-system/{minorfactioninsystem_pk}/states:
    get:
      operationId: bgs_minor_factions_in_system_states_list
      description: Retrieve a list of states for a specific minor faction in a system.
      parameters:
      - in: path
        name: minorfactioninsystem_pk
        schema:
          type: integer
        description: The ID of the minor faction in system.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - bgs
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStateInMinorFactionList'
          description: ''
    post:
      operationId: bgs_minor_factions_in_system_states_create
      description: Add a state to a minor faction in a system.
      parameters:
      - in: path
        name: minorfactioninsystem_pk
        schema:
          type: integer
        description: The ID of the minor faction in system.
        required: true
      tags:
