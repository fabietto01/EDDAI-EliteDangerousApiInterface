  /api/v1/body/star:
    get:
      operationId: body_star_list
      description: Returns a list of stars only.
      parameters:
      - in: query
        name: distance__gt
        schema:
          type: number
          format: float
        description: Filter bodies whose distance is greater than the specified value.
      - in: query
        name: distance__gte
        schema:
          type: number
          format: float
        description: Filter bodies whose distance is greater than or equal to the
          specified value.
      - in: query
        name: distance__lt
        schema:
          type: number
          format: float
        description: Filter bodies whose distance is less than the specified value.
      - in: query
        name: distance__lte
        schema:
          type: number
          format: float
        description: Filter bodies whose distance is less than or equal to the specified
          value.
      - in: query
        name: distance_by_system
        schema:
          type: integer
          format: int64
        description: ID of the system from which to calculate the distance between
          systems
      - in: query
        name: filter_distance_by_system__gt
        schema:
          type: number
          format: float
        description: Filter systems with a distance greater than the specified value
          (in Ly). If no distance limit is provided, the system sets a maximum distance
          of 200 Ly.
      - in: query
        name: filter_distance_by_system__lt
        schema:
          type: number
          format: float
        description: Filter systems with a distance less than the specified value
          (in Ly). If no distance limit is provided, the system sets a maximum distance
          of 200 Ly.
      - in: query
        name: luminosity
        schema:
          type: integer
          format: int64
        description: Filter by the luminosity of the star.
      - in: query
        name: name
        schema:
          type: string
        description: Filter by the name of the body.
      - in: query
        name: name__startswith
        schema:
          type: string
        description: Filter bodies whose names start with the specified string.
      - in: query
        name: order_distance_by_system
        schema:
          type: string
          enum:
          - -distance_st
          - distance_st
          default: distance_st
        description: Order the results by distance from the specified system
      - in: query
        name: ordering_body
        schema:
          type: boolean
        description: Sorts the bodies in the system according to their hierarchy in
          the system, filter only works if passed in conteporanium with system
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: starType
        schema:
          type: integer
          format: int64
        description: Filter by the type of the star.
      - in: query
        name: system
        schema:
          type: integer
          format: int64
        description: Filters based on the system ID of the body. this filter disables
          the possibility of calculating distances between systemi
