      description: Retrieve a list of all minor factions in systems.
      parameters:
      - in: query
        name: Influence_max
        schema:
          type: number
          format: double
          nullable: true
      - in: query
        name: Influence_min
        schema:
          type: number
          format: double
          nullable: true
      - in: query
        name: minorFaction
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: system
        schema:
          type: integer
      tags:
      - bgs
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMinorFactionInSystemBasicInformationList'
          description: ''
    post:
