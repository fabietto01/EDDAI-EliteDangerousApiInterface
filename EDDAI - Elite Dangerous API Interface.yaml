            application/json:
              schema:
                $ref: '#/components/schemas/StateInMinorFaction'
          description: ''
  /api/v1/bgs/minor-factions-in-system/{minorfactioninsystem_pk}/states/{id}:
    get:
      operationId: bgs_minor_factions_in_system_states_retrieve
      description: Get detailed information about a specific state of a minor faction
        in a system.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this State from the Minor
          Faction.
        required: true
      - in: path
        name: minorfactioninsystem_pk
        schema:
          type: integer
        description: The ID of the minor faction in system.
        required: true
      tags:
      - bgs
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
