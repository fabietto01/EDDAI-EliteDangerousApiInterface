  /api/v1/ring:
    get:
      operationId: ring_list
      description: Returns a list of rings.
      parameters:
      - in: query
        name: body
        schema:
          type: integer
          format: int64
        description: Filter rings by the body ID they belong to.
      - in: query
        name: body__system
        schema:
          type: integer
          format: int64
        description: Filter rings by the system ID of their parent body.
      - in: query
        name: distance_by_system
        schema:
          type: integer
          format: int64
        description: ID of the system from which to calculate the distance between
          systems
      - in: query
        name: filter_distance_by_system__gt
        schema:
          type: number
          format: float
        description: Filter systems with a distance greater than the specified value
          (in Ly). If no distance limit is provided, the system sets a maximum distance
          of 200 Ly.
      - in: query
        name: filter_distance_by_system__lt
        schema:
          type: number
          format: float
        description: Filter systems with a distance less than the specified value
          (in Ly). If no distance limit is provided, the system sets a maximum distance
          of 200 Ly.
      - in: query
        name: hotspot_type
        schema:
          type: array
          items:
            type: string
        description: Hotspot Type
        explode: true
        style: form
      - in: query
        name: name
        schema:
          type: string
        description: Filter rings by their name.
      - in: query
        name: order_distance_by_system
        schema:
          type: string
          enum:
          - -distance_st
          - distance_st
          default: distance_st
        description: Order the results by distance from the specified system
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: ringType
        schema:
          type: string
        description: Filter rings by their exact ring type.
      - in: query
        name: ringType__in
        schema:
          type: string
        description: Filter rings by a list of ring types (comma-separated).
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - ring
      security:
      - cookieAuth: []
      - tokenAuth: []
      - {}
      responses:
